<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/daily.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <a class="logo" href="index.html">Prism</a>

  <div class="nav-links">

    <a href="courses.html"><img src="data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='%23222222' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' viewBox='0 0 24 24'%3e%3cpath d='M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z'/%3e%3c/svg%3e" alt="Courses Icon" class="nav-icon">Courses</a>
    <a href="daily.html"><img src="data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3cpath stroke='%23222222' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 6v6l4 2m6-2c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10'/%3e%3c/svg%3e" alt="Daily Icon" class="nav-icon">Daily</a>
  </div>
  <div class="nav-right">
    <div class="stat-box">
      <img src="data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3cpath stroke='%23222222' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M14.25 2H8.493c-.18 0-.27 0-.348.027a.5.5 0 0 0-.187.116c-.06.058-.1.139-.18.3l-4.2 8.4c-.192.383-.288.574-.265.73a.5.5 0 0 0 .208.337c.129.09.343.09.772.09h6.205l-3 10L19.694 9.355c.411-.426.617-.64.629-.822a.5.5 0 0 0-.177-.415C20.005 8 19.71 8 19.117 8h-7.118z'/%3e%3c/svg%3e" alt="Streak">
      <span id="streakCount">0</span>
    </div>

    <div class="stat-box">
      <img src="data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3cpath stroke='%23222222' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2.39 18.098 8.225-14.206c.455-.785.682-1.178.979-1.31a1 1 0 0 1 .812 0c.297.132.524.525.978 1.31l8.225 14.206c.456.788.685 1.182.65 1.506a1 1 0 0 1-.406.705c-.263.191-.718.191-1.628.191H3.775c-.91 0-1.366 0-1.629-.191a1 1 0 0 1-.406-.705c-.034-.324.194-.718.65-1.506'/%3e%3c/svg%3e" alt="Points">
      <span>120</span>
    </div>

    <div class="profile" id="profileIcon">?
      <div class="profile-menu" id="profileMenu">
        <a href="#" id="changeUserBtn">Switch User</a>
      </div>
    </div>
  </div>
</nav>

<div class="daily-container">
  <div class="problem-box">
    <div class="problem-header">
      <span class="problem-code" id="problemCode"></span>
      <h1 class="problem-title" id="problemTitle"></h1>
    </div>

    <div class="problem-statement" id="problemStatement"></div>
    <p class="problem-source" id="problemSource"></p>

    <div class="answer-box">
      <textarea id="solutionInput" placeholder="Write your full solution here..."></textarea>
      <div class="answer-controls">
        <input id="apiKeyInput" type="password" placeholder="Optional: OpenAI API key for AI grading">
        <button class="submit-btn" id="submitBtn">Submit Solution</button>
      </div>
      <p id="submitFeedback" class="submit-feedback"></p>
    </div>
  </div>

  <div class="side-panel">
    <div class="leaderboard">
      <h2>Today's Leaderboard</h2>
      <div id="leaderboardList" class="leaderboard-list"></div>
    </div>

    <div class="calendar">
      <h2 id="calendarTitle"></h2>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>
</div>

<div class="user-modal" id="userModal" aria-hidden="true">
  <div class="user-modal-card">
    <h2>Choose username</h2>
    <p>We use this to save your scores and show you on the leaderboard.</p>
    <form id="userForm">
      <input id="userNameInput" type="text" placeholder="e.g. EulerFan" maxlength="24" required>
      <button type="submit" class="submit-btn">Save</button>
    </form>
  </div>
</div>

<script src="js/daily-data.js"></script>
<script src="js/daily.js"></script>
</body>
</html>
